<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Poseidon - PrimeNG</title>
        <base href="/" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://primefaces.org" />
        <link rel="icon" type="image/x-icon" href="favicon.png" />
        <style>
            body {
                margin: 0;
            }

            .loader-container {
                display: flex;
                width: 100%;
                height: 100%;
                overflow: hidden;
                min-height: 100vh;
                background: #343a40;
            }

            .loader {
                position: relative;
                margin: auto;
            }

            .middle {
                top: 0;
                left: 0;
                width: 40px;
                height: 2px;
                background: white;
                position: absolute;
                animation: middleAnimation 2s infinite linear;
                animation-delay: -100ms;
            }

            .bottom {
                top: 0;
                left: 0;
                position: absolute;
                height: 30px;
                width: 2px;
                background: white;
                border-radius: 2px;
                transform-origin: bottom;
                transform: rotate(45deg);
                animation: bottomAnimation 4s infinite;
            }

            .bottom:nth-child(1) {
                animation-delay: -1000ms;
            }

            .bottom:nth-child(2) {
                animation-delay: -2000ms;
            }

            .bottom:nth-child(3) {
                animation-delay: -3000ms;
            }

            .bottom-section {
                position: absolute;
                transform: translateY(-16px);
            }

            .top-section {
                position: absolute;
                transform: translateY(16px);
                transform: scaleY(-1);
            }

            @keyframes bottomAnimation {
                0% {
                    transform: rotate(45deg) scaleY(1);
                }

                25% {
                    transform: rotate(0) scaleY(0.7);
                }

                50% {
                    transform: rotate(-45deg) scaleY(1);
                }

                75% {
                    transform: rotate(0) scaleY(0.7);
                }

                100% {
                    transform: rotate(45deg) scaleY(1);
                }
            }

            @keyframes middleAnimation {
                0% {
                    transform: translateY(0) scaleX(1) rotate(0);
                }

                12.5% {
                    transform: translateY(16px) scaleX(0.5) rotate(0);
                }

                25% {
                    transform: translateY(30px) scaleX(1) rotate(0);
                }

                37.5% {
                    transform: translateY(15px) scaleX(0.5) rotate(-45deg);
                }

                50% {
                    transform: translateY(0) scaleX(1) rotate(-90deg);
                }

                62.5% {
                    transform: translateY(-15px) scaleX(0.5) rotate(-135deg);
                }

                75% {
                    transform: translateY(-30px) scaleX(1) rotate(-180deg);
                }

                87.5% {
                    transform: translateY(-15px) scaleX(0.5) rotate(-225deg);
                }

                100% {
                    transform: translateY(0) scaleX(1) rotate(-360deg);
                }
            }
        </style>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet" />
    </head>

    <body>
        <app-root>
            <div class="loader-container">
                <div class="loader">
                    <div class="bottom-section">
                        <div class="bottom"></div>
                        <div class="bottom"></div>
                        <div class="bottom"></div>
                        <div class="bottom"></div>
                    </div>
                    <div class="top-section">
                        <div class="bottom"></div>
                        <div class="bottom"></div>
                        <div class="bottom"></div>
                        <div class="bottom"></div>
                    </div>
                    <div class="middle"></div>
                </div>
            </div>
        </app-root>
    </body>
</html>
